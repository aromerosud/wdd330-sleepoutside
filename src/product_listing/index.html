<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Products</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product-listing.js" type="module"></script>
</head>

<body>
    <header class="divider" id="header"></header>
    <main class="divider">
        <section class="products">
            <h2>Top Products: <span class="title highlight"></span></h2>

            <div class="search-container">
                <input type="text" id="product-search" class="search-input"
                    placeholder="Search products by name, brand, etc..." aria-label="Search products" />
            </div>

            <div class="sort-container">
                <label for="sortOptions">Sort by:</label>
                <select id="sortOptions">
                    <option value="">Select</option>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="price-asc">Price (Low to High)</option>
                    <option value="price-desc">Price (High to Low)</option>
                </select>
            </div>

            <ul class="product-list"></ul>
        </section>
    </main>
    <footer id="footer"></footer>
</body>

</html>
